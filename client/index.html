<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Google Search Console Verification -->
    <meta name="google-site-verification" content="AEaJtYOIC1wqLOjvTK6G4EpKKz9TIQqdjztpGVf37bg" />

    <!-- Bing Webmaster Tools Verification -->
    <meta name="msvalidate.01" content="2E5D54B1E539C39E03CB1D5A66ED18D1" />

    <!-- Primary SEO -->
    <title>%%PAGE_TITLE%%</title>
    <meta name="description" content="%%PAGE_DESCRIPTION%%" />
    <meta name="keywords" content="%%PAGE_KEYWORDS%%" />
    <link rel="canonical" href="https://%%BRAND_DOMAIN%%/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://%%BRAND_DOMAIN%%/" />
    <meta property="og:title" content="%%PAGE_TITLE%%" />
    <meta property="og:description" content="%%PAGE_DESCRIPTION%%" />
    <meta property="og:image" content="https://%%BRAND_DOMAIN%%/og-image.png" />
    <meta property="og:image:width" content="2752" />
    <meta property="og:image:height" content="1536" />
    <meta property="og:site_name" content="%%BRAND_NAME%%" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%%PAGE_TITLE%%" />
    <meta name="twitter:description" content="%%PAGE_DESCRIPTION%%" />
    <meta name="twitter:image" content="https://%%BRAND_DOMAIN%%/og-image.png" />

    <!-- JSON-LD: WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "%%BRAND_NAME%%",
      "url": "https://%%BRAND_DOMAIN%%",
      "description": "Free online PDF editor. Edit, convert, sign and compress PDF files directly in your browser. No installation required.",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Any",
      "browserRequirements": "Requires JavaScript. Works in Chrome, Firefox, Safari, Edge.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "EUR",
        "description": "Free to use with optional premium subscription"
      },
      "featureList": [
        "Edit text in PDF",
        "Add digital signature to PDF",
        "Convert PDF to Word",
        "Convert PDF to JPG",
        "Merge PDF files",
        "Compress PDF",
        "Password protect PDF",
        "Annotate PDF online"
      ]
    }
    </script>

    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How to edit a PDF online for free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Go to %%BRAND_DOMAIN%%, drag your PDF file to the upload area or click Upload PDF. Then use the available tools to add text, signatures, images or annotations, and download when done. No installation required."
          }
        },
        {
          "@type": "Question",
          "name": "Can I edit a PDF without downloading software?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. %%BRAND_NAME%% works entirely in your browser. No app or software download is needed. It works in Chrome, Firefox, Safari and Edge."
          }
        },
        {
          "@type": "Question",
          "name": "How to convert PDF to Word online?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Upload your PDF to %%BRAND_DOMAIN%%, select the PDF to Word conversion tool, and download the resulting Word document. The conversion preserves formatting and layout."
          }
        },
        {
          "@type": "Question",
          "name": "How to sign a PDF online?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Upload your PDF, select the Sign tool, draw your signature with the mouse or touchscreen, type your name, or upload a signature image. Then position it on the document and download."
          }
        },
        {
          "@type": "Question",
          "name": "Is %%BRAND_NAME%% free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, %%BRAND_NAME%% is free to use. You can edit, annotate and view PDFs for free. Downloading the edited file requires a subscription with a 7-day free trial."
          }
        }
      ]
    }
    </script>
    %%TRACKING_SCRIPTS%%

    <!-- Paddle.js v2 -->
    <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>

    <!-- Favicons -->
    %%FAVICON_LINKS%%

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&family=Dancing+Script:wght@600;700&family=Alex+Brush&family=Great+Vibes&family=Pacifico&family=Sacramento&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
