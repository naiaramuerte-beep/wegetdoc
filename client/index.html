    {

      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How to edit a PDF online for free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Go to pdfup.io, drag your PDF file to the upload area or click Upload PDF. Then use the available tools to add text, signatures, images or annotations, and download when done. No installation required."
          }
        },
        {
          "@type": "Question",
          "name": "Can I edit a PDF without downloading software?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. PDFUp works entirely in your browser. No app or software download is needed. It works in Chrome, Firefox, Safari and Edge."
          }
        },
        {
          "@type": "Question",
          "name": "How to convert PDF to Word online?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Upload your PDF to pdfup.io, select the PDF to Word conversion tool, and download the resulting Word document. The conversion preserves formatting and layout."
          }
        },
        {
          "@type": "Question",
          "name": "How to sign a PDF online?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Upload your PDF, select the Sign tool, draw your signature with the mouse or touchscreen, type your name, or upload a signature image. Then position it on the document and download."
          }
        },
        {
          "@type": "Question",
          "name": "Is PDFUp free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, PDFUp is free to use. You can edit, annotate and view PDFs for free. Downloading the edited file requires a subscription with a 7-day free trial."
          }
        }
      ]
    }
